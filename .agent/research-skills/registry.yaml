version: v1.1
planning_root: .agent/research-skills
runtime_roots:
  skills: .agents/skills
  research_data: doc/research

skills:
  - id: research-conductor
    path: .agents/skills/research-conductor
    role: workflow-orchestrator
    reads:
      - doc/research/memory/*
      - doc/research/memory/runtime-environments.yaml
      - doc/research/memory/domain-profile.yaml
      - doc/research/programs/<program-id>/charter.yaml
      - doc/research/programs/<program-id>/workflow/*
      - doc/research/library/landscapes/<survey-id>/*
    writes:
      - doc/research/programs/<program-id>/charter.yaml
      - doc/research/programs/<program-id>/workflow/state.yaml
      - doc/research/programs/<program-id>/workflow/open-questions.yaml
      - doc/research/programs/<program-id>/workflow/decision-log.md
      - doc/research/programs/<program-id>/workflow/evidence-requests.yaml
      - doc/research/programs/<program-id>/workflow/preferences.yaml
      - doc/research/memory/user-profile.yaml
      - doc/research/memory/skill-preferences.yaml
      - doc/research/memory/runtime-environments.yaml
      - doc/research/memory/domain-profile.yaml
    triggers:
      - create or resume a research program
      - instantiate a program from a landscape candidate seed
      - clarify goals or constraints through dialogue
      - record decisions or preferences
      - route next step to another research skill
    boundaries:
      - no deep literature parsing
      - no repo scanning
      - no detailed method design

  - id: literature-corpus-builder
    path: .agents/skills/literature-corpus-builder
    role: literature-intake-and-canonicalization
    reads:
      - raw/*
      - doc/research/memory/domain-profile.yaml
      - doc/research/intake/papers/review/pending.yaml
      - doc/research/library/literature/index.yaml
      - doc/research/library/search/results/*.yaml
    writes:
      - doc/research/intake/papers/downloads/<intake-id>/
      - doc/research/intake/papers/review/pending.yaml
      - doc/research/intake/papers/review/resolved.yaml
      - doc/research/library/literature/index.yaml
      - doc/research/library/literature/graph.yaml
      - doc/research/library/literature/<source-id>/source/*
      - doc/research/library/literature/<source-id>/metadata.yaml
      - doc/research/library/literature/<source-id>/claims.yaml
      - doc/research/library/literature/<source-id>/methods.yaml
      - doc/research/library/literature/<source-id>/note.md
    triggers:
      - ingest local PDF from raw/
      - ingest arXiv, DOI, OpenReview, blog, or project page link
      - ingest shortlisted URLs from literature-scout search results
      - resolve a fuzzy duplicate review
      - rebuild literature index
      - refresh canonical note scaffolds and short summaries
      - refresh placeholder literature claims and status markers
    boundaries:
      - no program-level reasoning
      - no idea selection

  - id: literature-tagger
    path: .agents/skills/literature-tagger
    role: literature-tag-curation
    reads:
      - doc/research/memory/domain-profile.yaml
      - doc/research/library/literature/index.yaml
      - doc/research/library/literature/graph.yaml
      - doc/research/library/literature/tags.yaml
      - doc/research/library/literature/tag-taxonomy.yaml
      - doc/research/library/literature/<source-id>/metadata.yaml
    writes:
      - doc/research/library/literature/index.yaml
      - doc/research/library/literature/graph.yaml
      - doc/research/library/literature/tags.yaml
      - doc/research/library/literature/tag-taxonomy.yaml
      - doc/research/library/literature/<source-id>/metadata.yaml
    triggers:
      - refresh literature tags after batch intake
      - retag canonical papers from title and abstract
      - manually assign or normalize literature tags and topics
      - maintain canonical tag taxonomy, aliases, and lint rules
    boundaries:
      - no source ingestion or downloading
      - no bibliography rewrites during normal tag cleanup

  - id: literature-scout
    path: .agents/skills/literature-scout
    role: external-search-staging
    reads:
      - doc/research/programs/<program-id>/charter.yaml
      - doc/research/programs/<program-id>/workflow/evidence-requests.yaml
    writes:
      - doc/research/library/search/results/<search-id>.yaml
    triggers:
      - user asks for latest papers or external search
      - evidence request needs outside knowledge
    boundaries:
      - no direct write into canonical literature library

  - id: literature-analyst
    path: .agents/skills/literature-analyst
    role: program-scoped-literature-synthesis
    reads:
      - doc/research/memory/domain-profile.yaml
      - doc/research/programs/<program-id>/charter.yaml
      - doc/research/programs/<program-id>/workflow/state.yaml
      - doc/research/library/literature/*
      - doc/research/library/literature/tag-taxonomy.yaml
    writes:
      - doc/research/programs/<program-id>/evidence/literature-map.yaml
      - doc/research/programs/<program-id>/workflow/state.yaml
    triggers:
      - summarize relevant literature for a program
      - identify gaps, conflicts, clusters, and candidate directions
    boundaries:
      - no final idea approval

  - id: research-landscape-analyst
    path: .agents/skills/research-landscape-analyst
    role: shared-library-landscape-synthesis
    reads:
      - doc/research/memory/domain-profile.yaml
      - doc/research/library/literature/*
      - doc/research/library/literature/tag-taxonomy.yaml
      - doc/research/library/repos/*
    writes:
      - doc/research/library/landscapes/<survey-id>/landscape-report.yaml
      - doc/research/library/landscapes/<survey-id>/summary.md
    triggers:
      - analyze the current database for a specified field or direction
      - summarize research trends before choosing a concrete program
      - propose candidate programs from the current library snapshot
      - list relevant papers or repos by tag or related topic
    boundaries:
      - no direct mutation of canonical literature or repo metadata
      - no direct program creation

  - id: research-kb-browser
    path: .agents/skills/research-kb-browser
    role: read-only-knowledge-browser
    reads:
      - doc/research/memory/domain-profile.yaml
      - doc/research/library/literature/index.yaml
      - doc/research/library/literature/tag-taxonomy.yaml
      - doc/research/library/literature/<source-id>/*
      - doc/research/library/repos/index.yaml
      - doc/research/library/repos/<repo-id>/*
      - doc/research/library/landscapes/<survey-id>/*
      - doc/research/programs/<program-id>/charter.yaml
      - doc/research/programs/<program-id>/workflow/state.yaml
      - doc/research/programs/<program-id>/evidence/literature-map.yaml
      - doc/research/programs/<program-id>/ideas/*
      - doc/research/programs/<program-id>/design/*
    writes:
      - doc/research/user/kb/index.html
      - doc/research/user/kb/snapshot.json
      - doc/research/user/kb/assets/*
      - doc/research/user/kb/.runtime/launcher-state.json
      - doc/research/user/kb/.runtime/build-status.json
      - doc/research/user/kb/.runtime/server.log
    triggers:
      - visualize the research knowledge base in a human-friendly local UI
      - browse literature, repos, tags, landscapes, and programs from one place
      - keep a local research dashboard updated in the background
    boundaries:
      - no mutation of canonical literature, repo, program, or memory yaml
      - no in-browser editing or writeback api in the first version

  - id: repo-cataloger
    path: .agents/skills/repo-cataloger
    role: repo-intake-and-canonicalization
    reads:
      - local repo paths
      - raw/*
      - doc/research/intake/repos/review/pending.yaml
      - doc/research/library/repos/index.yaml
    writes:
      - doc/research/intake/repos/downloads/<intake-id>/
      - doc/research/intake/repos/review/pending.yaml
      - doc/research/intake/repos/review/resolved.yaml
      - doc/research/library/repos/index.yaml
      - doc/research/library/repos/<repo-id>/source/
      - doc/research/library/repos/<repo-id>/summary.yaml
      - doc/research/library/repos/<repo-id>/entrypoints.yaml
      - doc/research/library/repos/<repo-id>/modules.yaml
      - doc/research/library/repos/<repo-id>/repo-notes.md
    triggers:
      - ingest local repo
      - ingest GitHub repo
      - resolve repo duplicate review
      - rebuild repo index
      - refresh canonical repo note scaffolds and short summaries
    boundaries:
      - no final repo selection for a program

  - id: idea-forge
    path: .agents/skills/idea-forge
    role: idea-generation
    reads:
      - doc/research/memory/domain-profile.yaml
      - doc/research/programs/<program-id>/charter.yaml
      - doc/research/programs/<program-id>/evidence/literature-map.yaml
      - doc/research/programs/<program-id>/workflow/state.yaml
      - doc/research/library/repos/index.yaml
    writes:
      - doc/research/programs/<program-id>/ideas/index.yaml
      - doc/research/programs/<program-id>/ideas/<idea-id>/proposal.yaml
      - doc/research/programs/<program-id>/workflow/state.yaml
    triggers:
      - generate candidate ideas from a charter and evidence map
    boundaries:
      - no review.yaml
      - no decision.yaml

  - id: idea-review-board
    path: .agents/skills/idea-review-board
    role: idea-evaluation-and-selection
    reads:
      - doc/research/programs/<program-id>/ideas/index.yaml
      - doc/research/programs/<program-id>/ideas/<idea-id>/proposal.yaml
      - doc/research/programs/<program-id>/evidence/literature-map.yaml
      - doc/research/programs/<program-id>/workflow/state.yaml
      - doc/research/library/search/results/*.yaml
    writes:
      - doc/research/programs/<program-id>/ideas/<idea-id>/review.yaml
      - doc/research/programs/<program-id>/ideas/<idea-id>/decision.yaml
      - doc/research/programs/<program-id>/ideas/index.yaml
      - doc/research/programs/<program-id>/workflow/evidence-requests.yaml
      - doc/research/programs/<program-id>/workflow/state.yaml
    triggers:
      - shortlist or reject idea candidates
      - assess novelty and overlap risk
      - request more evidence before selection
      - list candidate ideas for user comparison
      - generate collaborative review or revision assistance before a final pick
    boundaries:
      - no proposal rewrite
      - no silent external knowledge injection
      - no automatic final selection unless explicitly requested

  - id: method-designer
    path: .agents/skills/method-designer
    role: implementation-planning
    reads:
      - doc/research/memory/domain-profile.yaml
      - doc/research/programs/<program-id>/ideas/<idea-id>/proposal.yaml
      - doc/research/programs/<program-id>/ideas/<idea-id>/review.yaml
      - doc/research/programs/<program-id>/ideas/<idea-id>/decision.yaml
      - doc/research/programs/<program-id>/workflow/state.yaml
      - doc/research/library/repos/*
      - doc/research/library/benchmarks/*
    writes:
      - doc/research/programs/<program-id>/design/selected-idea.yaml
      - doc/research/programs/<program-id>/design/repo-choice.yaml
      - doc/research/programs/<program-id>/design/interfaces.yaml
      - doc/research/programs/<program-id>/design/coordination-contracts.yaml
      - doc/research/programs/<program-id>/design/system-design.md
      - doc/research/programs/<program-id>/experiments/matrix.yaml
      - doc/research/programs/<program-id>/experiments/runbook.md
      - doc/research/programs/<program-id>/workflow/state.yaml
    triggers:
      - turn a selected idea into a concrete design and experiment plan
    boundaries:
      - no direct code edits
      - no experiment execution
